<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>Job Application Tracker</h1>
            <button class="secondary" onclick="logout()">Logout</button>
        </div>

        <div class="add-job-form">
            <h2>Add New Application</h2>
            <input type="text" id="company" placeholder="Company name" />
            <input type="text" id="role" placeholder="Job role" />
            <select id="status">
                <option value="applied">Applied</option>
                <option value="interview">Interview</option>
                <option value="offer">Offer</option>
                <option value="rejected">Rejected</option>
            </select>
            <textarea id="notes" placeholder="Notes (optional)" rows="3"></textarea>
            <button onclick="addJob()">Add Application</button>
        </div>

        <div id="jobs-container"></div>
    </div>

    <script>
        const API = "http://127.0.0.1:8000";
        const token = localStorage.getItem("token");

        if (!token) {
            window.location.href = "index.html";
        }

        function logout() {
            localStorage.removeItem("token");
            window.location.href = "index.html";
        }

        function getHeaders() {
            return {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            };
        }

        async function loadJobs() {
            const res = await fetch(`${API}/jobs/`, {
                headers: getHeaders()
            });

            if (res.status === 401) {
                logout();
                return;
            }

            const jobs = await res.json();
            const container = document.getElementById("jobs-container");

            if (jobs.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h2>No applications yet</h2>
                        <p>Add your first job application above!</p>
                    </div>`;
                return;
            }

            container.innerHTML = `<div class="jobs-grid">
                ${jobs.map(job => `
                    <div class="job-card ${job.status}">
                        <h3>${job.company}</h3>
                        <p>${job.role}</p>
                        <p>${new Date(job.applied_date).toLocaleDateString()}</p>
                        <span class="status ${job.status}">${job.status}</span>
                        ${job.notes ? `<p>${job.notes}</p>` : ""}
                        <div class="job-card-actions">
                            <select onchange="updateStatus(${job.id}, this.value)">
                                <option value="applied" ${job.status === 'applied' ? 'selected' : ''}>Applied</option>
                                <option value="interview" ${job.status === 'interview' ? 'selected' : ''}>Interview</option>
                                <option value="offer" ${job.status === 'offer' ? 'selected' : ''}>Offer</option>
                                <option value="rejected" ${job.status === 'rejected' ? 'selected' : ''}>Rejected</option>
                            </select>
                            <button class="danger" onclick="deleteJob(${job.id})">Delete</button>
                        </div>
                    </div>
                `).join("")}
            </div>`;
        }

        async function addJob() {
            const company = document.getElementById("company").value;
            const role = document.getElementById("role").value;
            const status = document.getElementById("status").value;
            const notes = document.getElementById("notes").value;

            if (!company || !role) {
                alert("Company and role are required!");
                return;
            }

            const res = await fetch(`${API}/jobs/`, {
                method: "POST",
                headers: getHeaders(),
                body: JSON.stringify({ company, role, status, notes })
            });

            if (res.ok) {
                document.getElementById("company").value = "";
                document.getElementById("role").value = "";
                document.getElementById("notes").value = "";
                loadJobs();
            }
        }

        async function updateStatus(jobId, newStatus) {
            await fetch(`${API}/jobs/${jobId}`, {
                method: "PUT",
                headers: getHeaders(),
                body: JSON.stringify({ status: newStatus })
            });
            loadJobs();
        }

        async function deleteJob(jobId) {
            if (!confirm("Are you sure you want to delete this application?")) return;
            await fetch(`${API}/jobs/${jobId}`, {
                method: "DELETE",
                headers: getHeaders()
            });
            loadJobs();
        }

        loadJobs();
    </script>
</body>
</html>
